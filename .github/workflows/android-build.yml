name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found, skipping decode."
          fi

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Locate and Rename APK (if needed)
        run: |
          mkdir -p build-artifacts
          # Find any generated release APK
          apk_path=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -n "$apk_path" ]; then
            echo "Found APK: $apk_path"
            cp "$apk_path" build-artifacts/app-release.apk
          else
            echo "No release APK found in release directory, searching wider..."
            any_apk=$(find app/build/outputs/apk/ -name "*.apk" | head -n 1)
            if [ -n "$any_apk" ]; then
              echo "Found alternative APK: $any_apk"
              cp "$any_apk" build-artifacts/app-release.apk
            else
              echo "ERROR: No APK found!"
              exit 1
            fi
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build-artifacts/app-release.apk
